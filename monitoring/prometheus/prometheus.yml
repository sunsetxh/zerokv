global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: 'zerokv-cluster'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

# Load rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # ZeroKV Server metrics
  - job_name: 'zerokv-server'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          instance: 'server-1'
          role: 'server'

  # ZeroKV Client metrics
  - job_name: 'zerokv-client'
    static_configs:
      - targets:
          - 'localhost:9091'
        labels:
          instance: 'client-1'
          role: 'client'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets:
          - 'node-exporter:9100'
