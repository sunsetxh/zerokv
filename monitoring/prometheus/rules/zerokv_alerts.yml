groups:
  - name: zerokv_alerts
    interval: 10s
    rules:
      # High latency warning
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(zerokv_operation_duration_seconds_bucket[1m])) > 0.001
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency detected"
          description: "P95 latency is {{ $value | humanizeDuration }} (threshold: 1ms) for {{ $labels.operation }} on {{ $labels.instance }}"

      # Critical high latency
      - alert: CriticalHighLatency
        expr: histogram_quantile(0.95, rate(zerokv_operation_duration_seconds_bucket[1m])) > 0.005
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical P95 latency detected"
          description: "P95 latency is {{ $value | humanizeDuration }} (threshold: 5ms) for {{ $labels.operation }} on {{ $labels.instance }}"

      # Low throughput warning
      - alert: LowThroughput
        expr: rate(zerokv_operation_total[1m]) < 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low QPS detected"
          description: "QPS is {{ $value | printf \"%.2f\" }} (threshold: 100) for {{ $labels.operation }} on {{ $labels.instance }}"

      # High error rate
      - alert: HighErrorRate
        expr: |
          (
            rate(zerokv_operation_total{status="failure"}[5m])
            /
            rate(zerokv_operation_total[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%) for {{ $labels.operation }} on {{ $labels.instance }}"

      # Server down
      - alert: ServerDown
        expr: up{job="zerokv-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ZeroKV Server is down"
          description: "Server instance {{ $labels.instance }} is unreachable"

      # Low bandwidth utilization
      - alert: LowBandwidth
        expr: zerokv_throughput_bytes_per_second < 100000000  # <100MB/s
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low bandwidth utilization"
          description: "Throughput is {{ $value | humanize }}B/s (threshold: 100MB/s) on {{ $labels.instance }}"

      # Too many active connections
      - alert: TooManyConnections
        expr: zerokv_active_connections > 900
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many active connections"
          description: "Active connections: {{ $value }} (threshold: 900) on {{ $labels.instance }}"

      # Memory usage high
      - alert: HighMemoryUsage
        expr: zerokv_registered_memory_bytes > 100000000000  # >100GB
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High registered memory usage"
          description: "Registered memory: {{ $value | humanize }}B (threshold: 100GB) on {{ $labels.instance }}"
