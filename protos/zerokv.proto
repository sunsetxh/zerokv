syntax = "proto3";

package zerokv.proto;

// Data types
enum DataType {
    FP32 = 0;
    FP16 = 1;
    INT32 = 2;
    INT64 = 3;
    UINT8 = 4;
}

// Put request
message PutRequest {
    string key = 1;
    uint64 dev_ptr = 2;      // Device pointer as uint64
    uint64 size = 3;         // Data size in bytes
    DataType data_type = 4;
    string client_id = 5;
}

// Put response
message PutResponse {
    int32 status_code = 1;
    string error_message = 2;
}

// Get request
message GetRequest {
    string key = 1;
    string client_id = 2;
    bytes client_root_info = 3;  // HcclRootInfo for P2P connection
}

// Get response
message GetResponse {
    int32 status_code = 1;
    string error_message = 2;
    uint64 dev_ptr = 3;           // Server device pointer
    uint64 size = 4;              // Data size
    DataType data_type = 5;
    bytes server_root_info = 6;   // Server HcclRootInfo for P2P
}

// Delete request
message DeleteRequest {
    string key = 1;
    string client_id = 2;
}

// Delete response
message DeleteResponse {
    int32 status_code = 1;
    string error_message = 2;
}

// Server statistics request
message ServerStatsRequest {
    // Empty for now
}

// Server statistics response
message ServerStatsResponse {
    uint64 kv_count = 1;
    uint64 total_memory_bytes = 2;
    uint32 active_connections = 3;
    uint64 uptime_seconds = 4;
}
